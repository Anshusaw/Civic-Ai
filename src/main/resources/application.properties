spring.application.name=Project Name

server.port=9090

logging.level.org.springframework.security=DEBUG

# ===============================
# Database Configuration
# ===============================
spring.datasource.username=root
spring.datasource.url=jdbc:mysql://localhost:3306/civicai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.password=anshu123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA & Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


# ===============================
# OAuth2
# ===============================
spring.security.oauth2.client.registration.google.client-id=your-id
spring.security.oauth2.client.registration.google.client-secret=your-code
spring.security.oauth2.client.registration.google.scope=email,profile

#Authorized redirect URIs
#http://localhost:9090/login/oauth2/code/google

#Google Oauth2 link to create secret id:
#https://console.cloud.google.com/apis

# ===============================
# Gmail SMTP Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
#some live servers block 587 port
#spring.mail.port=587 
spring.mail.username=your-id
spring.mail.password=your-password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


# Groq API configuration (OpenAI-compatible)
#Create your key from following URL
#https://console.groq.com/keys
spring.ai.openai.api-key=your-key
spring.ai.openai.base-url=https://api.groq.com/openai
# Choose free model
spring.ai.openai.chat.options.model=openai/gpt-oss-120b

#The maximum size allowed for a single uploaded file.
spring.servlet.multipart.max-file-size=100MB  
#The total size of the entire request (all form data + all files combined).
spring.servlet.multipart.max-request-size=100MB

# ===============================
# Custom Values
# ===============================
admin.name=ADMIN
admin.email=admin@gmail.com
admin.password=admin123